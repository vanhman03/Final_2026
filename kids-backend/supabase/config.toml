# A string used to distinguish different Supabase projects on the same host
project_id = "brightspark-kids"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true
ip_version = "ipv4"

[studio]
enabled = true
port = 54323
api_url = "http://localhost"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["https://localhost:5173"]
jwt_expiry = 604800
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[edge_functions]
enabled = true

# Edge Runtime configuration
[edge_runtime]
policy = "per_worker"

# Configure individual edge functions
[[edge_runtime.functions]]
name = "payment-webhook"
verify_jwt = false

[[edge_runtime.functions]]
name = "send-email"
verify_jwt = true

[[edge_runtime.functions]]
name = "analytics"
verify_jwt = true

[[edge_runtime.functions]]
name = "admin-tools"
verify_jwt = true
